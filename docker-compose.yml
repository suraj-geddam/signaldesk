services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signaldesk
      POSTGRES_USER: signaldesk
      POSTGRES_PASSWORD: signaldesk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signaldesk"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: .
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://signaldesk:signaldesk@db:5432/signaldesk
      JWT_SECRET: dev-secret-do-not-use-in-prod
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
