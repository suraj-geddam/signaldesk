name: CI

on:
  push:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: signaldesk_test
          POSTGRES_USER: signaldesk
          POSTGRES_PASSWORD: signaldesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signaldesk"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Init DB
        run: psql -h localhost -U signaldesk -d signaldesk_test -f init.sql
        env:
          PGPASSWORD: signaldesk

      - name: Test
        run: uv run pytest --tb=short
        env:
          DATABASE_URL: postgresql://signaldesk:signaldesk@localhost:5432/signaldesk_test
          JWT_SECRET: test-secret

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc -b

      - name: Test
        working-directory: frontend
        run: npm test

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health > /dev/null 2>&1; do sleep 2; done'
          timeout 60 bash -c 'until curl -sf http://localhost:5173 > /dev/null 2>&1; do sleep 2; done'

      - name: Run Playwright e2e tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
