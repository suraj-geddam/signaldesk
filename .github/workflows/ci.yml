name: CI

on:
  push:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: signaldesk_test
          POSTGRES_USER: signaldesk
          POSTGRES_PASSWORD: signaldesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signaldesk"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Init DB
        run: psql -h localhost -U signaldesk -d signaldesk_test -f init.sql
        env:
          PGPASSWORD: signaldesk

      - name: Test
        run: uv run pytest --tb=short
        env:
          DATABASE_URL: postgresql://signaldesk:signaldesk@localhost:5432/signaldesk_test
          JWT_SECRET: test-secret
